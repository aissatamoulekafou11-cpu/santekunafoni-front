<app-sidebar></app-sidebar>
<div class="content-wrapper">
    
    <div class="b">
<input type="text" [ngModel]="searchTerm()" (ngModelChange)="searchTerm.set($event)" placeholder="Rechercher...">        <a routerLink="/ajouter-tratement" class="b-ajout">Ajouter</a>
    </div>

    <div class="tableau table-responsive">
        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom du traitement</th>
                    <th>Description</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                @for (t of traitementsFiltres(); track t.idTraitement) {
                    <tr>
                        <td>{{ t.idTraitement }}</td>
                        <td>{{ t.nomTraitement }}</td>
                        <td>{{ t.description }}</td>
                        <td>{{ t.datefin }}</td>
                        <td>
                            <span class="modiff">
                                <a [routerLink]="['/modifier-traitement', t.idTraitement]">
                                    <i class="fa-solid fa-pencil"></i>
                                </a>
                            </span>
                            <span class="supp">
                                <a href="javascript:void(0)" (click)="supprimerTraitement(t.idTraitement)">
                                    <i class="fa-solid fa-trash"></i>
                                </a>
                            </span>
                        </td>
                    </tr>
                } @empty {
                    <tr>
                        <td colspan="5" class="no-result" style="text-align: center;">
                            <i class="fa-solid fa-circle-info"></i> Aucun traitement ne correspond à votre recherche.
                        </td>
                    </tr>
                }
            </tbody>
        </table>

        <nav aria-label="Pagination des traitements">
            <ul class="pagination ms-auto">
                <li class="page-item">
                    <a href="javascript:void(0)" class="page-link">Précédent</a>
                </li>
                <li class="page-item active">
                    <a href="javascript:void(0)" class="page-link">1</a>
                </li>
                <li class="page-item">
                    <a href="javascript:void(0)" class="page-link">2</a>
                </li>
                <li class="page-item">
                    <a href="javascript:void(0)" class="page-link">3</a>
                </li>
                <li class="page-item">
                    <a href="javascript:void(0)" class="page-link">Suivant</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
