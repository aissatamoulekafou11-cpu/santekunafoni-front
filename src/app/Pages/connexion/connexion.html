<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg border-0" style="max-width: 900px; background-color: #e9f0ec; border-radius: 20px; overflow: hidden;">
    <div class="row g-0">
      
      <div class="col-md-5 d-flex align-items-center justify-content-center p-4 bg-white position-relative" 
           style="border: 4px solid #16423C !important; 
                  border-top-left-radius: 20px; 
                  border-bottom-left-radius: 20px; 
                  border-top-right-radius: 80px; 
                  border-bottom-right-radius: 0px;">
        <div class="text-center p-4">
          <div style="font-size: 5rem; color: #16423C;">
            <img src="/docteresse.jpg" alt="Logo" class="img-fluid" style="border-radius: 10px; max-height: 400px; object-fit: cover;">
          </div>
        </div>
      </div>

      <div class="col-md-7 p-5  d-flex flex-column justify-content-center" style="background-color: #e9f0ec;">
        <h2 class="fw-bold text-dark mb-4 text-center">Connexion</h2>

        <div *ngIf="errorMessage" class="alert alert-danger text-center p-2 small mb-3" role="alert">
          {{ errorMessage }}
        </div>

        <form [formGroup]="connexionForm" (ngSubmit)="onLogin()">
          
          <div class="mb-3">
            <label class="form-label fw-semibold text-dark">Téléphone</label>
            <input type="text" formControlName="tel" class="form-control p-2" placeholder="Entrer votre numéro" style="border: 2px solid #16423C;">
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold text-dark">Mot de passe</label>
            <input type="password" formControlName="motpass" class="form-control p-2" placeholder="******" style="border: 2px solid #16423C;">
          </div>

          <div class="d-grid gap-2 col-md-8 mx-auto mt-4">
            <button type="submit" class="btn fw-bold p-2 text-dark" style="border: 2px solid #16423C; background-color: #d1dfd8;">
              Se connecter
            </button>
          </div>

          <div class="text-center mt-4 position-relative" style="z-index: 5;">
            <a routerLink="/inscription" class="text-decoration-none fw-semibold text-secondary small">
              Pas encore de compte ? Créer un compte
            </a>
          </div>

        </form>
      </div>

    </div>
  </div>
</div>
