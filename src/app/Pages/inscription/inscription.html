<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg border-0"
    style="max-width: 900px; background-color: #e9f0ec; border-radius: 20px; overflow: hidden;">
    <div class="row g-0">

      <div class="col-md-5 d-flex align-items-center justify-content-center p-4 bg-white position-relative" style="border: 4px solid #16423C !important; 
                  border-top-left-radius: 20px; 
                  border-bottom-left-radius: 20px; 
                  border-top-right-radius: 80px; 
                  border-bottom-right-radius: 0px;">
        <div class="text-center p-4">
          <div style="font-size: 5rem; color: #16423C;">
            <img src="logo.png" alt="Logo" class="img-fluid"
              style="border-radius: 10px; max-height: 400px; object-fit: cover;">
          </div>
        </div>
      </div>

      <div class="col-md-7 p-5 d-flex flex-column justify-content-center" style="background-color: #e9f0ec;">
        <h2 class="fw-bold text-dark mb-4 text-center">Inscription</h2>

        <div *ngIf="errorMessage" class="alert alert-danger text-center p-2 small mb-3" role="alert">
          {{ errorMessage }}
        </div>

        <form [formGroup]="inscriptionForm" (ngSubmit)="onSubmit()">

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold text-dark">Nom</label>
              <input type="text" formControlName="nom" class="form-control p-2" placeholder="nom"
                style="border: 2px solid #16423C;">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold text-dark">Prénom</label>
              <input type="text" formControlName="prenom" class="form-control p-2" placeholder="prénom"
                style="border: 2px solid #16423C;">
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-8">
              <label class="form-label fw-semibold text-dark">Téléphone</label>
              <input type="text" formControlName="tel" class="form-control p-2" placeholder="entrer votre numéro"
                style="border: 2px solid #16423C;">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold text-dark">Âge</label>
              <input type="number" formControlName="age" class="form-control p-2" placeholder="ex: 25"
                style="border: 2px solid #16423C;">
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-5">
              <label class="form-label fw-semibold text-dark">Sexe</label>
              <select formControlName="sexe" class="form-select p-2" style="border: 2px solid #16423C;">
                <option value="" disabled selected>Choisir...</option>
                <option value="M">Masculin</option>
                <option value="F">Féminin</option>
              </select>
            </div>
            <div class="col-md-7">
              <label class="form-label fw-semibold text-dark">Localité (Ville/Quartier)</label>
              <input type="text" formControlName="localite" class="form-control p-2" placeholder="ex: Bamako"
                style="border: 2px solid #16423C;">
            </div>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label fw-semibold text-dark">Mot de passe</label>
              <input type="password" formControlName="motpass" class="form-control p-2" placeholder="******"
                style="border: 2px solid #16423C;">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold text-dark">Confirmer</label>
              <input type="password" formControlName="confirmerMotpass" class="form-control p-2" placeholder="******"
                style="border: 2px solid #16423C;">
            </div>
          </div>

          <div class="d-grid gap-2 col-md-8 mx-auto mt-4">
            <button type="submit" [disabled]="inscriptionForm.invalid" class="btn fw-bold p-2 text-dark"
              [style.border]="'2px solid #16423C'" [style.background-color]="'#d1dfd8'"
              [style.opacity]="inscriptionForm.invalid ? '0.6' : '1'"
              [style.cursor]="inscriptionForm.invalid ? 'not-allowed' : 'pointer'">
              Valider l'inscription
            </button>
          </div>

          <div class="text-center mt-3 position-relative" style="z-index: 5;">
            <a routerLink="/connexion"
              class="text-decoration-none fw-semibold text-secondary small d-inline-flex align-items-center gap-1"
              style="cursor: pointer !important;">
              <i class="bi bi-arrow-left"></i> Déjà un compte ? Se connecter
            </a>
          </div>

        </form>
      </div>

    </div>
  </div>
</div>
