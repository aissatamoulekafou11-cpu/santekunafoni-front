<div class="dashboard-container">

  <!-- Sidebar -->
  <app-sidebar></app-sidebar>
  
    <!-- Header -->
    <app-header></app-header>

  <!-- Contenu principal -->
  <div class="main-content">


    <!-- Contenu du dashboard -->
    <div class="dashboard-content">

      <!-- Cartes -->
      <div class="row g-4">

        <!-- Agents -->
        <div class="col-xl-4 col-lg-4 col-md-6 col-12">

          <div class="stat-cardAgent">

            <div class="card-header">

              <span>Nombre de Agent de santé</span>

              <i class="fa-solid fa-user-nurse"></i>

            </div>

            <div class="card-body">

              <h2>{{ stats.totalAgentsSante }}</h2>

            </div>

          </div>

        </div>

        <!-- Patients -->

        <div class="col-xl-4 col-lg-4 col-md-6 col-12">

          <div class="stat-cardFull">

            <div class="card-header">

              <span>Nombre de Patient</span>

              <i class="fa-solid fa-user"></i>

            </div>

            <div class="card-body">

              <h2>{{ stats.totalPatients }}</h2>

            </div>

          </div>

        </div>

        <!-- Alertes -->

        <div class="col-xl-4 col-lg-4 col-md-6 col-12">

          <div class="stat-cardFull">

            <div class="card-header">

              <span>Nombre d'Alerte</span>

              <i class="bi bi-exclamation-triangle-fill"></i>

            </div>

            <div class="card-body">

              <h2>{{stats.totalAlertes}}</h2>

            </div>

          </div>

        </div>

      </div>

      <!-- Graphique -->

      <div class="row mt-4">

        <div class="col-12">

          <div class="chart-card">

            <div class="chart-header">

              <h4>Graphe des alertes</h4>

            </div>

            <div class="chart-body">

              <canvas id="dashboardChart"></canvas>

            </div>

          </div>

        </div>

      </div>

      <!-- Google Maps -->

      <div class="row mt-4">

        <div class="col-12">

          <div class="map-card">

            <div class="map-header">

              <h4>Carte géographique</h4>

            </div>

            <div class="map-body">

             <div id="map"></div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
