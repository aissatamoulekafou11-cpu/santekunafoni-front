<div class="body">
  <div class="right-left">
    <div class="agents-container">

      <!-- Header -->
      <app-header></app-header>

      <!-- Contenu du dashboard -->
      <div class="dashboard-content">

        <!-- Cartes de statistiques -->
        <div class="row g-4">

          <!-- Card 1: Agents de santé -->
          <div class="col-xl-4 col-lg-4 col-md-6 col-12">
            <div class="stat-cardAgent">
              <div class="card-header">
                <span>Agents de santé</span>
                <i class="fa-solid fa-user-nurse"></i>
              </div>
              <div class="card-body">
                <h2>{{ stats.totalAgentsSante}}</h2>
              </div>
            </div>
          </div>

          <!-- Card 2: Patients -->
          <div class="col-xl-4 col-lg-4 col-md-6 col-12">
            <div class="stat-cardAgent">
              <div class="card-header">
                <span>Patients</span>
                <i class="fa-solid fa-bed-pulse"></i>
              </div>
              <div class="card-body">
                <h2>{{ stats.totalPatients}}</h2>
              </div>
            </div>
          </div>

          <!-- Card 3: Alertes -->
          <div class="col-xl-4 col-lg-4 col-md-6 col-12">
            <div class="stat-cardFull">
              <div class="card-header">
                <span>Alertes</span>
                <i class="bi bi-exclamation-triangle-fill"></i>
              </div>
              <div class="card-body">
                <h2>{{ stats.totalAlertes}}</h2>
              </div>
            </div>
          </div>

        </div> <!-- Fin de la rangée de cartes -->

        <!-- Graphique -->
        <div class="row mt-4">
          <div class="col-12">
            <div class="chart-card">
              <div class="chart-header">
                <h4>Graphe des alertes</h4>
              </div>
              <div class="chart-body">
                <canvas id="dashboardChart"></canvas>
              </div>
            </div>
          </div>
        </div>

        <!-- Carte géographique -->
        <div class="row mt-4">
          <div class="col-12">
            <div class="map-card">
              <div class="map-header">
                <h4>Carte géographique</h4>
              </div>
              <div class="map-body">
                <div id="map"></div>
              </div>
            </div>
          </div>
        </div>

      </div> <!-- Fin .dashboard-content -->
    </div> <!-- Fin .agents-container -->
  </div> <!-- Fin .right-left -->
</div> <!-- Fin .body -->
