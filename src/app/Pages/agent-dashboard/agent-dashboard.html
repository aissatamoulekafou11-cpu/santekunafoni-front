<!--<app-sidebar-agent></app-sidebar-agent> -->
<app-sidebar></app-sidebar>
<app-header></app-header>
<div class="main-content">

   <!-- <app-header></app-header>-->

    <div class="dashboard">

        <div class="cards">

            <!-- Patients -->
            <div class="card patient">

                <div class="card-icon">

                    <i class="bi bi-people-fill"></i>

                </div>

                <div class="card-info">

                    <h2>{{ nombrePatients }}</h2>

                    <span>Patients</span>

                </div>

            </div>

            <!-- Symptômes -->
            <div class="card symptome">

                <div class="card-icon">

                    <i class="bi bi-clipboard2-pulse-fill"></i>

                </div>

                <div class="card-info">

                    <h2>{{ nombreSymptomes }}</h2>

                    <span>Symptômes</span>

                </div>

            </div>

            <!-- Maladies -->
            <div class="card maladie">

                <div class="card-icon">

                    <i class="bi bi-heart-pulse-fill"></i>

                </div>

                <div class="card-info">

                    <h2>{{ nombreMaladies }}</h2>

                    <span>Maladies</span>

                </div>

            </div>

            <!-- Traitements -->
            <div class="card traitement">

                <div class="card-icon">

                    <i class="bi bi-capsule-pill"></i>

                </div>

                <div class="card-info">

                    <h2>{{ nombreTraitements }}</h2>

                    <span>Traitements</span>

                </div>

            </div>

        </div>

    </div>

</div>
