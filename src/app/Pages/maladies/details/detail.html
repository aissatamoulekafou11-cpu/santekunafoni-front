<!-- Fond sombre -->
<div class="modal-overlay" *ngIf="isModalOpen">

  <!-- Fenêtre -->
  <div class="modal-container">

    <!-- En-tête -->
    <div class="modal-header">

      <h3>Détails Maladie</h3>

      <button class="close-btn" (click)="closeModal()">
        &times;
      </button>

    </div>

    <hr>

    <!-- Corps -->
    <div class="modal-body">

      <div class="row">

        <div class="col-md-6 mb-3">
          <label>Id</label>
          <input
            type="text"
            class="form-control"
            [value]="maladie.id"
            readonly>
        </div>

        <div class="col-md-6 mb-3">
          <label>Nom</label>
          <input
            type="text"
            class="form-control"
            [value]="maladie.nom"
            readonly>
        </div>

        <div class="col-md-6">
          <label>Description</label>
          <input
            type="text"
            class="form-control"
            [value]="maladie.description"
            readonly>
        </div>

        <div class="col-md-6">
          <label>Date Déclaration</label>
          <input
            type="text"
            class="form-control"
            [value]="maladie.dateDeclaration"
            readonly>
        </div>

      </div>

    </div>

  </div>

</div>
