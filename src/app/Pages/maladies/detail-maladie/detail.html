<div class="modal-overlay" (click)="onClose()">
  
  <div class="modal-content" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h2 class="modal-title">Détails Maladie</h2>
      <button class="close-btn" (click)="onClose()" aria-label="Fermer">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <hr class="separator" />

    <div class="modal-body" *ngIf="maladie">
      
      <div class="row">
        <div class="col">
          <label class="field-label">Id</label>
          <div class="id-value">{{ maladie.id }}</div>
        </div>
        <div class="col">
          <label class="field-label">Nom</label>
          <div class="field-input">{{ maladie.nom }}</div>
        </div>
      </div>

      <div class="row">
        <div class="col">
          <label class="field-label">Description</label>
          <div class="field-input text-truncate">{{ maladie.description }}</div>
        </div>
        <div class="col">
          <label class="field-label">Date Déclaration</label>
          <div class="field-input">{{ maladie.dateDeclaration }}</div>
        </div>
      </div>

    </div>
  </div>
</div>
