<div class="maladies-container">
  <h1 class="page-title">Maladies</h1>

  <div class="control-bar">
    <button class="btn-ajouter" (click)="onAjouter()">Ajouter</button>

    <div class="search-box">
      <input 
        type="text" 
        placeholder="Rechercher une maladie" 
        [(ngModel)]="searchTerm"
        (input)="onSearch()"
      />
      <span class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </span>
    </div>

    <button class="btn-filtrer" (click)="onFiltrer()">
      Filtrer
      <span class="filter-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
      </span>
    </button>
  </div>

  <div class="table-responsive">
    <table class="maladies-table">
      <thead>
        <tr>
          <th style="width: 8%;">Id</th>
          <th style="width: 25%;">Nom</th>
          <th style="width: 35%;">Description</th>
          <th style="width: 17%;">DateDéclaration</th>
          <th style="width: 15%; text-align: center;">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let maladie of filteredMaladies">
          <td class="font-bold">{{ maladie.id }}</td>
          <td>{{ maladie.nom }}</td>
          <td class="text-muted">{{ maladie.description }}</td>
          <td>{{ maladie.dateDeclaration }}</td>
          <td class="actions-cell">
            <button class="action-btn edit-btn" (click)="onEdit(maladie.id)" title="Modifier">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"></path></svg>
            </button>
            
            <button class="action-btn info-btn" (click)="onViewInfo(maladie.id)" title="Détails">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
            </button>
            
            <button class="action-btn delete-btn" (click)="onDelete(maladie.id)" title="Supprimer">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            </button>
          </td>
        </tr>
        
        <tr *ngIf="filteredMaladies.length === 0">
          <td colspan="5" class="no-data">Aucune maladie trouvée.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
