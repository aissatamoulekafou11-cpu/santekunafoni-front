

<div class="content-wrapper">
    <div class="main">
        <div class="top">
            <h1 class="titre">Modifier un traitement</h1>
        </div>

        <div class="titre2">
            <h2>Veuillez modifier les informations ci-dessous pour mettre à jour le traitement du patient !</h2>
        </div>

        <!-- SELECTION DU PATIENT -->
        <div class="card-form id">
            <h2>Sélection du patient</h2>
            <form>
                <label for="id_patient">id du patient</label><br>
                <!-- Lié à traitement.id_patient -->
                <select id="id_patient" [(ngModel)]="traitement.id_patient" name="id_patient">
                    <option value="0" disabled>-- Sélectionnez un patient --</option>
                    @for (idenPatient of idPatients(); track $index) {
                        <option [value]="idenPatient.idUtilisateur">{{ idenPatient.nom }} {{ idenPatient.prenom }}</option>
                    }
                </select>
            </form>
        </div>

        <!-- SELECTION DE LA MALADIE -->
        <div class="card-form select-maladie">
            <h2>Sélection de la maladie concernée</h2>
            <form>
                <label for="id_maladie">id de la maladie</label><br>
                <!-- Lié à traitement.id_maladie -->
                <select id="id_maladie" [(ngModel)]="traitement.id_maladie" name="id_maladie">
                    <option value="0" disabled>-- Sélectionnez une maladie --</option>
                    @for (identifiant of idMaladie(); track $index) {
                        <option [value]="identifiant.idMaladie">{{ identifiant.nomMaladie || identifiant.nom }}</option>
                    }
                </select>
            </form>
        </div>

        <!-- INFORMATIONS DU TRAITEMENT -->
        <div class="card-form select-traitemet">
            <h2>Informations du traitement</h2>
            <form id="formbutton" class="form-grid" (ngSubmit)="onSubmit()">
                <div class="form-group-col">
                    <label for="nom">Nom du traitement</label>
                    <!-- Correction : Lié à traitement.nomTraitement -->
                    <input type="text" id="nom" [(ngModel)]="traitement.nomTraitement" name="nomTraitement" required>

                    <label for="date_debut">Date début</label>
                    <!-- Correction : Lié à traitement.dateDebut (ou le nom exact dans ton modèle) -->
                    <input type="date" id="date_debut" [(ngModel)]="traitement.datedebut" name="date_debut">
                </div>

                <div class="form-group-col">
                    <label for="desc">Description</label>
                    <!-- Correction : Lié à traitement.description -->
                    <input type="text" id="desc" [(ngModel)]="traitement.description" name="description">

                    <label for="date_fin">Date fin</label>
                    <!-- Correction : Lié à traitement.dateFin -->
                    <input type="date" id="date_fin" [(ngModel)]="traitement.datefin" name="date_fin">
                </div>
            </form>
        </div>

        <!-- SELECTION DE L'AGENT -->
        <div class="card-form select-agent">
            <h2>Section Agent de santé</h2>
            <form>
                <label for="id_agent">id de l'agent de santé</label><br>
                <!-- Lié à traitement.id_agent_sante -->
                <select id="id_agent" [(ngModel)]="traitement.id_agent_sante" name="id_agent">
                    <option value="0" disabled>-- Sélectionnez un agent --</option>
                    @for (idenAgent of idAgent(); track $index) {
                        <option [value]="idenAgent.idUtilisateur">{{ idenAgent.nom }}</option>
                    }
                </select>
            </form>
        </div>

        <!-- BOUTONS D'ACTION -->
        <div class="btn1">
            <button type="button" class="annuler" (click)="onAnnuler()">Annuler</button>
            <button type="submit" class="ajouter" form="formbutton">Enregistrer</button>
        </div>
    </div>
</div>
