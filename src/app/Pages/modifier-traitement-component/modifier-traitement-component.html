<app-sidebar></app-sidebar>
<div class="main">
    <div class="top">
        <h1 class="titre">Modifier un traitement</h1>
    </div>

    <div class="titre2">
        <h2>Veuillez remplir les informations ci-dessous pour prescrire un traitement à un patient !</h2>
    </div>

    <div class="id">
        <h2>Selection du patient</h2>
        <form action="">
            <label for="id_patient">id du patient</label><br>
            <select name="id_patient" id="id_patient" [(ngModel)]="traitement.id_patient">
                <option value="0" disabled>-- Sélectionnez un patient --</option>
                @for (idenPatient of idPatients(); track $index) {
                    <option [value]="idenPatient.idUtilisateur">{{ idenPatient.nom }} {{ idenPatient.prenom }}</option>
                }
            </select>
        </form>
    </div>

    <div class="select-maladie">
        <h2>Selection du maladie concernée </h2>
        <form action="">
            <label for="id_maladie">id de la maladie</label><br>
            <select name="id_maladie" id="id_maladie" [(ngModel)]="traitement.id_maladie">
                <option value="0" disabled>-- Sélectionnez une maladie --</option>
                @for (identifiant of idMaladie(); track $index) {
                    <option [value]="identifiant.idMaladie">{{ identifiant.nomMaladie || identifiant.nom }}</option>
                }
            </select>
        </form>
    </div>

    <div class="select-traitemet">
        <h2>Informations du traitements </h2>
         <form id="formbutton" class="form" (ngSubmit)="onSubmit()">
            <div class="left">
                <label for="nom">Nom du traitement</label><br>
                <input type="text" id="nom" name="nom" [(ngModel)]="traitement.nomTraitement" required><br>

                <label for="date_debut">Date début</label><br>
                <input type="date" id="date_debut" name="date_debut" [(ngModel)]="traitement.datedebut">
            </div>

            <div class="right">
                <label for="desc">Description</label><br>
                <input type="text" id="desc" name="desc" [(ngModel)]="traitement.description"><br>

                <label for="date_fin">Date fin</label><br>
                <input type="date" id="date_fin" name="date_fin" [(ngModel)]="traitement.datefin">
            </div>
        </form>
    </div>

    <div class="select-agent">
        <h2>Section Agent de santé</h2>
        <form action="">
            <label for="id_agent">id de la maladie</label><br>
            <select name="id-agent" id="id_agent" [(ngModel)]="traitement.id_agent_sante">
                <option value="0" disabled>-- Sélectionnez un agent --</option>
                @for (idenAgent of idAgent(); track $index) {
                    <option [value]="idenAgent.idUtilisateur">{{ idenAgent.nom }}</option>
                }
            </select>
        </form>
    </div>

    <div class="btn1">
        <button type="button" class="annuler" (click)="onAnnuler()">Annuler</button>
        <button type="submit" class="ajouter" form="formbutton">Modifier</button>
    </div>
</div>
