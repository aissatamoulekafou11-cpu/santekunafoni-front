<div class="body">
    <div class="right-left">
        <app-sidebar class="left"></app-sidebar>

        <div class="agents-container">
            <app-header></app-header>
                <button class="add-btn"> Ajouter un agent</button>

            <div class="table">
                <table class="agent-table">
                    <thead>
                        <tr>
                            <th>Id</th>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Spécialité</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let agent of listAgent">
                            <td>{{ agent.id }}</td>
                            <td>{{ agent.nom}}</td>
                            <td>{{ agent.prenom}}</td>
                            <td>{{ agent.specialite}}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
